services:
  ly-blog:
    # 镜像：Docker Hub 上的镜像名与标签（这里固定 latest）
    image: "luoyuee/ly-blog:latest"
    # 容器名称：固定后便于 docker logs / docker exec 等命令操作
    container_name: ly-blog
    # 容器退出时的重启策略：
    # - unless-stopped：除非你手动 stop，否则 Docker 会在异常退出或 Docker Desktop 重启后自动拉起容器
    restart: unless-stopped
    # 端口映射：宿主机 3200 -> 容器 3000（应用对外提供服务的端口）
    ports:
      - "3200:3000"
    # 将宿主机映射到容器内的固定域名，便于容器访问宿主机服务（例如宿主机上的数据库）
    # - host.docker.internal：Docker Desktop 提供的“宿主机别名”
    # - host-gateway：将其解析到宿主机网关地址（在 Linux/WSL 里更稳定）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 运行时环境变量：按你的实际生产配置替换
    environment:
      # 外部数据库连接串（建议使用宿主机 PostgreSQL 或同网络内的 DB）
      LY_DATABASE_URL: "your-database-url"
      # CZDB 授权 Key
      LY_CZDB_KEY: "your-czdb-key"
      # JWT 签名密钥（用于登录态等）
      LY_JWT_SECRET: "your-jwt-secret"
    # 数据卷：WSL 下把 Windows 目录 /mnt/d/docker/ly-blog 挂载到容器内 /ly-blog/data
    # 用于持久化存储（例如文件、日志、备份、czdb 等）
    volumes:
      - "/mnt/d/docker/ly-blog:/ly-blog/data"
